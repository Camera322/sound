<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Космический Дрон</title>
  <style>
    body {
      background: radial-gradient(circle at center, #1a0033, #000);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    canvas {
      border: 1px solid #6b3fa0;
      border-radius: 20px;
      margin: 20px;
      box-shadow: 0 0 40px rgba(128, 0, 255, 0.4);
    }

    .panel {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 300px;
    }

    .knob {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
      color: #b98eff;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #3d2b5a;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 15px #b98eff;
      cursor: pointer;
    }

    button {
      background: #6b3fa0;
      border: none;
      color: white;
      padding: 15px;
      font-size: 1.2rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    button.active {
      background: #ff385c;
      box-shadow: 0 0 30px #ff385c;
    }
  </style>
</head>
<body>
<canvas id="visualizer" width="400" height="150"></canvas>

<div class="panel">
  <div class="knob">
    <label>🌀 Частота дрона</label>
    <input type="range" id="freq" min="20" max="500" value="110" step="1">
    <span id="freqVal">110 Hz</span>
  </div>
  <div class="knob">
    <label>✨ Модуляция (вибрато)</label>
    <input type="range" id="mod" min="0" max="50" value="5" step="0.5">
    <span id="modVal">5 Hz</span>
  </div>
  <div class="knob">
    <label>📡 Глубина реверберации</label>
    <input type="range" id="rev" min="0" max="5" value="1.5" step="0.1">
    <span id="revVal">1.5 sec</span>
  </div>
  <button id="startBtn">ЗАПУСК ДВИГАТЕЛЕЙ</button>
</div>

<script>
  let audioCtx, oscillator, gainNode, lfo, convolver, isPlaying = false;
  const canvas = document.getElementById('visualizer');
  const ctx = canvas.getContext('2d');

  function startAudio() {
    if (isPlaying) {
      oscillator.stop();
      audioCtx.close();
      document.getElementById('startBtn').textContent = 'ЗАПУСК ДВИГАТЕЛЕЙ';
      document.getElementById('startBtn').classList.remove('active');
      isPlaying = false;
      return;
    }

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Осциллятор (основной тон)
    oscillator = audioCtx.createOscillator();
    oscillator.type = 'triangle';

    // LFO для модуляции
    lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = parseFloat(document.getElementById('mod').value);

    // Ревербератор
    convolver = audioCtx.createConvolver();
    const rate = audioCtx.sampleRate;
    const length = rate * parseFloat(document.getElementById('rev').value);
    const impulse = audioCtx.createBuffer(2, length, rate);
    for (let i = 0; i < 2; i++) {
      const data = impulse.getChannelData(i);
      for (let j = 0; j < length; j++) {
        data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 2);
      }
    }
    convolver.buffer = impulse;

    const freq = parseFloat(document.getElementById('freq').value);
    oscillator.frequency.value = freq;
    lfo.frequency.value = parseFloat(document.getElementById('mod').value);

    // Маршрутизация: LFO модулирует частоту основного осциллятора
    lfo.connect(lfoGain);
    lfoGain.connect(oscillator.frequency);

    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.15;

    oscillator.connect(gainNode);
    gainNode.connect(convolver);
    convolver.connect(audioCtx.destination);

    oscillator.start();
    lfo.start();

    document.getElementById('startBtn').textContent = 'ГЛУШИТЬ';
    document.getElementById('startBtn').classList.add('active');
    isPlaying = true;

    visualize();
  }

  // Визуализация формы волны (упрощенно)
  function visualize() {
    if (!isPlaying) return;
    requestAnimationFrame(visualize);

    ctx.fillStyle = 'rgba(10, 0, 20, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 3;
    ctx.strokeStyle = '#b98eff';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#8a2be2';

    ctx.beginPath();
    const freq = parseFloat(document.getElementById('freq').value);
    const mod = parseFloat(document.getElementById('mod').value);

    for (let x = 0; x < canvas.width; x++) {
      const t = x / canvas.width;
      // Имитируем сложную волну с модуляцией
      const y = Math.sin(t * Math.PI * 8) * Math.sin(Date.now() * 0.005 * mod) * 30 + 75;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Обновление значений на лету
  document.getElementById('freq').addEventListener('input', function() {
    document.getElementById('freqVal').textContent = this.value + ' Hz';
    if (oscillator) oscillator.frequency.value = this.value;
  });

  document.getElementById('mod').addEventListener('input', function() {
    document.getElementById('modVal').textContent = this.value + ' Hz';
    if (lfo) lfo.frequency.value = this.value;
  });

  document.getElementById('rev').addEventListener('input', function() {
    document.getElementById('revVal').textContent = this.value + ' sec';
  });

  document.getElementById('startBtn').addEventListener('click', startAudio);
</script>
</body>
</html>
